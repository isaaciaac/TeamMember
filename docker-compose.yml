services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.9.5}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teammember}
      POSTGRES_USER: ${POSTGRES_USER:-teammember}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teammember_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    env_file:
      - ./.env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://teammember:teammember_password_change_me@postgres:5432/teammember}
      DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
  postgres_data:
